<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sunset Scout — where the last light lands</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Self-hosted map libs (vendored, no third-party CDN). See frontend/vendor/. -->
  <link href="vendor/maplibre-gl.css" rel="stylesheet" />
  <script src="vendor/maplibre-gl.js"></script>
  <script src="vendor/pmtiles.js"></script>
  <script src="vendor/basemap_theme.js"></script>
  <script src="vendor/suncalc.js"></script>
  <script src="sunset_azimuth.js"></script>
  <script src="bit_layout.js"></script>
  <script src="colorizer.js"></script>
  <script src="fill_mask.js"></script>
  <script src="format_guard.js"></script>

  <style>
  /* ═══ Sunset Lookout · final — trailhead palette, year-rail dock ═════════ */
  :root{
    --pine:#28402f;          /* deep pine — borders, ink on kraft       */
    --pine-2:#3c5844;        /* lighter pine — secondary strokes        */
    --kraft:#f0e6cd;         /* sign board                              */
    --kraft-2:#e3d6b2;       /* inset / recessed areas                  */
    --ember:#cf5b2e;         /* rust-ember accent                       */
    --brass:#d99a2b;         /* brass fittings — curve, sun knob        */
    --brown:#41372a;         /* body text on kraft                      */
    --faded:rgba(65,55,42,.62);
    --plate-shadow:0 2px 0 rgba(40,64,47,.35),0 12px 26px -12px rgba(40,64,47,.5);
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  html,body{margin:0;height:100%;overflow:hidden;background:#e9e2d4;}
  body{font-family:'Zilla Slab',Georgia,serif;color:var(--brown);}
  /* touch: no 300ms double-tap zoom on controls, no gray tap flash */
  button{touch-action:manipulation;}
  button,.rail{-webkit-tap-highlight-color:transparent;}
  .board,.dock{user-select:none;-webkit-user-select:none;}
  .cond{font-family:'Barlow Condensed',sans-serif;}
  .mono{font-family:'IBM Plex Mono',ui-monospace,monospace;}
  button{font-family:inherit;}
  button:focus-visible{outline:2.5px solid var(--ember);outline-offset:2px;}

  #map{position:fixed;inset:0;}
  .maplibregl-map{background:#e9e2d4;font:inherit;}

  /* shared "routed sign" plate */
  .plate{background:var(--kraft);border:2px solid var(--pine);
    border-radius:var(--radius);box-shadow:var(--plate-shadow);}

  /* ── sign board (top left): name + the simple legend ──────────────────── */
  .board{position:fixed;top:16px;left:16px;z-index:10;padding:11px 15px 10px;}
  .board-name{margin:0;font-size:19px;font-weight:700;line-height:1.05;
    color:var(--pine);letter-spacing:.01em;}
  .legend{display:flex;gap:14px;margin-top:8px;padding-top:8px;
    border-top:1.5px dashed rgba(40,64,47,.3);}
  .legend span{display:flex;align-items:center;gap:6px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--faded);white-space:nowrap;}
  .swatch{width:12px;height:12px;border-radius:3px;border:1.5px solid var(--pine);flex:none;}
  .swatch-lit{background:#fdfaf2;}
  .swatch-dark{background:#4c524f;}

  /* ── control stack (top right) ────────────────────────────────────────── */
  .ctl-stack{position:fixed;top:16px;right:16px;z-index:10;display:flex;
    flex-direction:column;gap:8px;}
  .ctl-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--pine);background:var(--kraft);
    border:2px solid var(--pine);border-radius:var(--radius);
    box-shadow:var(--plate-shadow);
    transition:transform .16s ease,background .16s ease;}
  .ctl-btn:hover{background:#f7efdb;transform:translateY(-1px);}
  .ctl-btn[data-busy="1"]{color:var(--ember);animation:locPulse 1.1s ease-in-out infinite;}
  @keyframes locPulse{0%,100%{opacity:1;}50%{opacity:.45;}}

  .toast{position:fixed;top:66px;right:16px;z-index:30;max-width:260px;
    background:var(--pine);color:var(--kraft);border-radius:var(--radius);
    padding:10px 14px;font-size:13px;line-height:1.5;box-shadow:var(--plate-shadow);
    opacity:0;transform:translateY(-6px);pointer-events:none;
    transition:opacity .25s ease,transform .3s cubic-bezier(.3,1.4,.5,1);}
  .toast[data-show="1"]{opacity:1;transform:none;}

  /* ── spot plate (right, left of the controls) ─────────────────────────── */
  .spot-plate{position:fixed;right:72px;top:16px;z-index:10;width:288px;
    max-width:calc(100vw - 100px);overflow:hidden;
    opacity:0;transform:translateX(12px) scale(.97);pointer-events:none;
    transition:opacity .22s ease,transform .3s cubic-bezier(.3,1.35,.5,1);}
  .spot-plate[data-open="1"]{opacity:1;transform:none;pointer-events:auto;}

  .sp-head{padding:13px 15px 12px;position:relative;
    border-bottom:2px solid var(--pine);}
  .sp-coords{font-size:12.5px;font-weight:500;letter-spacing:.02em;color:var(--pine);
    font-variant-numeric:tabular-nums;}
  .sp-verdict{margin:6px 0 0;font-size:20px;line-height:1.15;font-weight:700;
    color:var(--pine);letter-spacing:.005em;}
  .spot-plate[data-verdict="visible"] .sp-verdict{color:var(--ember);}
  .spot-plate[data-verdict="none"] .sp-verdict{color:var(--faded);font-size:16px;}
  .sp-close{position:absolute;top:9px;right:9px;width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    border:none;border-radius:7px;background:transparent;color:var(--faded);
    transition:background .15s ease,color .15s ease;}
  .sp-close:hover{background:rgba(40,64,47,.1);color:var(--pine);}

  .sp-rows{padding:4px 15px 8px;}
  .sp-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    padding:8px 0;}
  .sp-row + .sp-row{border-top:1.5px dashed rgba(40,64,47,.22);}
  .sp-key{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--faded);}
  .sp-val{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:500;
    color:var(--brown);font-variant-numeric:tabular-nums;text-align:right;}
  .sp-foot{padding:8px 15px 11px;border-top:1.5px dashed rgba(40,64,47,.22);
    font-size:11.5px;line-height:1.45;color:var(--faded);}

  /* selected-spot marker */
  .spot-marker{position:relative;width:18px;height:18px;pointer-events:none;}
  .spm-core{position:absolute;inset:5px;border-radius:50%;background:var(--ember);
    box-shadow:0 0 0 2px var(--kraft),0 0 12px 2px rgba(207,91,46,.75);}
  .spm-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--ember);
    animation:spotPulse 2.4s cubic-bezier(.4,0,.2,1) infinite;}
  @keyframes spotPulse{
    0%{transform:scale(.7);opacity:.9;}
    70%{transform:scale(2.1);opacity:0;}
    100%{opacity:0;}
  }

  /* ── the year-rail dock (bottom center, from alt) ─────────────────────── */
  .dock{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:10;
    display:flex;align-items:stretch;gap:8px;
    width:min(780px,calc(100vw - 28px));}
  .dock-side{display:flex;flex-direction:column;gap:6px;justify-content:center;}

  .date-chip{display:flex;flex-direction:column;align-items:flex-start;gap:1px;
    cursor:pointer;text-align:left;color:var(--brown);
    padding:8px 14px;min-width:120px;
    transition:background .16s ease,transform .16s ease;}
  .date-chip:hover{background:#f7efdb;transform:translateY(-1px);}
  .dc-wk{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;
    letter-spacing:.18em;color:var(--ember);text-transform:uppercase;}
  .dc-date{font-size:19px;font-weight:700;line-height:1.05;color:var(--pine);
    white-space:nowrap;}
  .dc-yr{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faded);}

  .rail-wrap{flex:1;display:flex;flex-direction:column;padding:5px 8px 3px;}
  .rail-cap{text-align:center;font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--faded);padding:1px 0 2px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;}
  .rail-cap[data-strip="1"]{color:var(--ember);}
  .rail-row{display:flex;align-items:stretch;flex:1;}
  .rail-step{width:30px;border:none;background:transparent;color:var(--faded);
    cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;
    transition:background .15s ease,color .15s ease;flex:none;}
  .rail-step:hover{background:rgba(40,64,47,.1);color:var(--pine);}

  .rail{position:relative;flex:1;cursor:pointer;touch-action:none;outline:none;
    border-radius:8px;}
  .rail:focus-visible{box-shadow:0 0 0 2.5px var(--ember);}
  .rail svg{display:block;width:100%;height:64px;}
  .rail .az-curve{fill:none;stroke:var(--brass);stroke-width:1.8;opacity:.95;}
  .rail .az-fill{fill:url(#railGlow);opacity:.5;}
  .rail .tick{stroke:rgba(40,64,47,.35);stroke-width:1;}
  .rail .tick-label{fill:var(--faded);font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:8px;letter-spacing:.08em;}
  .rail .month{fill:rgba(65,55,42,.5);font-family:'IBM Plex Mono',monospace;
    font-size:8px;text-anchor:middle;}
  .rail .today-mark{stroke:rgba(207,91,46,.6);stroke-width:1;stroke-dasharray:2 3;}
  .rail .day-v{fill:var(--ember);}
  .rail .day-b{fill:rgba(40,64,47,.18);}

  .knob{position:absolute;top:0;width:22px;height:100%;margin-left:-11px;
    display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .knob-line{position:absolute;top:4px;bottom:16px;width:1px;
    background:rgba(207,91,46,.55);}
  .knob-sun{position:relative;width:13px;height:13px;border-radius:50%;
    background:var(--brass);border:2px solid var(--pine);
    box-shadow:0 0 0 2px var(--kraft),0 0 10px 1px rgba(217,154,43,.7);
    transition:transform .18s ease;}
  .rail[data-drag="1"] .knob-sun{transform:scale(1.25);border-color:var(--ember);}

  .today-btn{cursor:pointer;color:var(--faded);padding:0 14px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;
    letter-spacing:.14em;text-transform:uppercase;height:100%;
    transition:background .16s ease,color .16s ease;}
  .today-btn:hover{background:#f7efdb;color:var(--pine);}
  .today-btn[data-today="1"]{color:var(--ember);}

  /* ── mini calendar popover ────────────────────────────────────────────── */
  .mini-cal{position:fixed;z-index:20;width:256px;padding:12px 12px 10px;
    opacity:0;transform:translateY(10px) scale(.97);pointer-events:none;
    transform-origin:bottom left;
    transition:opacity .2s ease,transform .3s cubic-bezier(.3,1.4,.5,1);}
  .mini-cal[data-open="1"]{opacity:1;transform:none;pointer-events:auto;}
  .mc-head{display:flex;align-items:center;justify-content:space-between;
    padding:0 2px 8px;}
  .mc-title{font-size:16px;font-weight:700;color:var(--pine);}
  .mc-title .yr{color:var(--faded);font-weight:500;}
  .mc-nav{width:26px;height:26px;border:1.5px solid var(--pine);border-radius:7px;
    background:var(--kraft-2);color:var(--pine);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease;}
  .mc-nav:hover{background:#f7efdb;}
  .mc-week{display:grid;grid-template-columns:repeat(7,1fr);padding-bottom:2px;}
  .mc-week span{text-align:center;font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:10px;letter-spacing:.06em;color:var(--faded);padding:3px 0;}
  .mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
  .mc-empty{aspect-ratio:1;}
  .mc-day{aspect-ratio:1;border:none;border-radius:7px;background:transparent;
    color:var(--brown);cursor:pointer;font-size:12px;
    font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;
    position:relative;transition:background .14s ease;}
  .mc-day:hover{background:rgba(40,64,47,.1);}
  .mc-day[data-today="1"]::after{content:"";position:absolute;bottom:3px;left:50%;
    transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--ember);}
  .mc-day[data-selected="1"]{background:var(--ember);color:var(--kraft);font-weight:600;}

  .maplibregl-ctrl-attrib{font-size:10px;}

  /* ── responsive ───────────────────────────────────────────────────────── */
  @media (max-width:640px){
    /* board can't run under the control stack (44px + margins) */
    .board{padding:8px 11px 7px;max-width:calc(100vw - 92px);}
    .board-name{font-size:15px;}
    .legend{gap:3px 10px;flex-wrap:wrap;margin-top:6px;padding-top:6px;}
    /* 44px minimum touch targets (Apple HIG) */
    .ctl-btn{width:44px;height:44px;}
    .spot-plate{right:10px;left:10px;width:auto;top:auto;
      bottom:calc(180px + env(safe-area-inset-bottom));
      max-height:calc(100vh - 244px);
      max-height:calc(100dvh - 244px);   /* dvh: stable under iOS URL-bar collapse */
      overflow-y:auto;}
    .sp-close{width:32px;height:32px;top:7px;right:7px;}
    .sp-verdict{font-size:18px;}
    .sp-foot{display:none;}
    .dock{bottom:max(10px,env(safe-area-inset-bottom));flex-wrap:wrap;gap:6px;
      width:calc(100vw - 20px);}
    .dock-side{flex-direction:row;order:2;flex:1;}
    .date-chip{flex:1;min-height:48px;justify-content:center;}
    .today-btn{padding:0 16px;min-height:48px;}
    .rail-wrap{order:1;width:100%;flex-basis:100%;}
    .rail svg{height:70px;}              /* fatter drag surface */
    .rail-step{width:42px;}
    .rail-cap{letter-spacing:.12em;font-size:10px;}
    .knob-sun{width:16px;height:16px;}   /* easier to see & grab */
    .knob-line{bottom:18px;}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.06s!important;}
  }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- sign board: name + simple legend -->
  <header class="board plate">
    <h1 class="board-name">Sunset Scout</h1>
    <div class="legend">
      <span><i class="swatch swatch-lit"></i>sunset visible</span>
      <span><i class="swatch swatch-dark"></i>blocked</span>
    </div>
  </header>

  <!-- controls -->
  <div class="ctl-stack">
    <button class="ctl-btn" id="locate" aria-label="Find my location">
      <svg width="17" height="17" viewBox="0 0 17 17">
        <circle cx="8.5" cy="8.5" r="4.6" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="8.5" cy="8.5" r="1.6" fill="currentColor"/>
        <path d="M8.5 .8v2.6M8.5 13.6v2.6M.8 8.5h2.6M13.6 8.5h2.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ctl-btn" id="zoom-in" aria-label="Zoom in">
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M7.5 2v11M2 7.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="ctl-btn" id="zoom-out" aria-label="Zoom out">
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M2 7.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <!-- spot plate -->
  <aside class="spot-plate plate" id="spot-plate" data-open="0" data-verdict="none" aria-hidden="true">
    <div class="sp-head">
      <div class="sp-coords mono" id="sp-coords">—</div>
      <h2 class="sp-verdict" id="sp-verdict">—</h2>
      <button class="sp-close" id="sp-close" aria-label="Close">
        <svg width="11" height="11" viewBox="0 0 11 11"><path d="M1.5 1.5 9.5 9.5M9.5 1.5 1.5 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="sp-rows" id="sp-rows"></div>
    <div class="sp-foot">Times in Pacific Standard Time.</div>
  </aside>

  <!-- year-rail dock -->
  <div class="dock">
    <div class="dock-side">
      <button class="date-chip plate" id="date-chip" aria-expanded="false" aria-label="Pick a date">
        <span class="dc-wk" id="dc-wk"></span>
        <span class="dc-date" id="dc-date"></span>
        <span class="dc-yr" id="dc-yr"></span>
      </button>
    </div>
    <div class="rail-wrap plate">
      <span class="rail-cap" id="rail-cap" data-strip="0">Drag the sun to pick a date</span>
      <div class="rail-row">
        <button class="rail-step" id="step-back" aria-label="Previous day">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M8 1.5 3.5 6 8 10.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="rail" id="rail" role="slider" tabindex="0" aria-label="Day of the year"
             aria-valuemin="1" aria-valuemax="366" aria-valuenow="1" aria-valuetext="">
          <svg id="rail-svg" preserveAspectRatio="none"></svg>
          <div class="knob" id="knob">
            <span class="knob-line"></span>
            <span class="knob-sun"></span>
          </div>
        </div>
        <button class="rail-step" id="step-fwd" aria-label="Next day">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M4 1.5 8.5 6 4 10.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
    <div class="dock-side">
      <button class="today-btn plate" id="today-btn" data-today="1">Today</button>
    </div>
  </div>

  <!-- mini calendar -->
  <div class="mini-cal plate" id="mini-cal" data-open="0" aria-hidden="true"></div>

  <script>
  (async () => {
    // ─── TileJSON fetch: all tileset config derives from it ─────────────────
    const tj = await fetch('tiles/tilejson.json').then(r => r.json());
    assertSupportedFormatVersion(tj.format_version);
    const layout = BitLayout.fromConfig(
      tj.azimuth_min_deg, tj.azimuth_max_deg, tj.azimuth_step_deg,
    );

    // Fill polygon: US land minus boxes minus ocean, rasterized per tile onto
    // the visibility raster itself. See index.html for the seam rationale.
    const fillGeo = await fetch('us_land_fill.geojson')
      .then((r) => (r.ok ? r.json() : null))
      .catch(() => null);
    const fillPolys = fillGeo?.features?.[0]?.geometry?.coordinates ?? null;
    const fillMasker = fillPolys ? createFillMasker(fillPolys) : null;
    const maskCache = new Map();
    function maskForTileUrl(tileUrl) {
      if (!fillMasker) return null;
      if (maskCache.has(tileUrl)) return maskCache.get(tileUrl);
      const m = tileUrl.match(/tiles\/(\d+)\/(\d+)\/(\d+)\.bin$/);
      const mask = m ? fillMasker(+m[1], +m[2], +m[3], tj.tile_size) : null;
      maskCache.set(tileUrl, mask);
      return mask;
    }

    function pointInRing(x, y, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if ((yi > y) !== (yj > y) &&
            x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
          inside = !inside;
        }
      }
      return inside;
    }
    function pointInFill(lng, lat) {
      if (!fillPolys) return false;
      for (const poly of fillPolys) {
        if (pointInRing(lng, lat, poly[0]) &&
            !poly.slice(1).some((hole) => pointInRing(lng, lat, hole))) {
          return true;
        }
      }
      return false;
    }

    // Local calendar date → YYYY-MM-DD (never toISOString: UTC skew).
    function dateToValue(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }
    function bitIndexForDate(dateValue, lat) {
      const [y, m, d] = dateValue.split('-').map(Number);
      return layout.azimuthToBitIndex(sunsetAzimuth(y, m, d, lat));
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    const INITIAL_CENTER = [-122.5, 37.85];
    let currentDate = new Date();
    let currentBitIndex = bitIndexForDate(dateToValue(currentDate), INITIAL_CENTER[1]);

    // ─── Visibility tile protocol (identical mechanics to index.html) ──────
    const EMPTY_TILE = (() => {
      const b64 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';
      const bin = atob(b64);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return arr.buffer;
    })();
    const rawCache = new Map();

    async function decompressGzip(buffer) {
      const ds = new DecompressionStream('gzip');
      const stream = new ReadableStream({
        start(c) { c.enqueue(new Uint8Array(buffer)); c.close(); },
      }).pipeThrough(ds);
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    function applyBitmask(raw, mask, tileSize, bytesPerPixel, bitIndex) {
      const out = new Uint8ClampedArray(tileSize * tileSize * 4);
      const { flagBitIndex } = layout;
      for (let i = 0; i < tileSize * tileSize; i++) {
        const j = i * 4;
        if (raw) {
          const pixel = raw.subarray(i * bytesPerPixel, (i + 1) * bytesPerPixel);
          const [r, g, b, a] = colorizeBitmaskPixel(pixel, flagBitIndex, bitIndex);
          if (a !== 0) {
            out[j] = r; out[j + 1] = g; out[j + 2] = b; out[j + 3] = a;
            continue;
          }
        }
        if (mask && mask[i]) out[j + 3] = 255; // uncovered US land → black
      }
      return out;
    }

    maplibregl.addProtocol('visibility', async (params) => {
      const tileUrl = params.url.replace('visibility://', '').split('?')[0];

      let cached = rawCache.get(tileUrl);
      if (!cached) {
        const r = await fetch(tileUrl, { cache: 'no-cache' });
        const raw = r.ok ? await decompressGzip(await r.arrayBuffer()) : null;
        const mask = maskForTileUrl(tileUrl);
        if (!raw && !mask) return { data: EMPTY_TILE }; // abroad / open ocean

        cached = { tileSize: tj.tile_size, bytesPerPixel: tj.bytes_per_pixel, raw, mask };
        rawCache.set(tileUrl, cached);
        // A fresh tile may cover the open spot: refresh verdict AND the
        // rail's per-day strip (both sample the cache).
        if (spotOpen) { renderPlate(); drawRail(); }
      }

      const { tileSize, bytesPerPixel, raw, mask } = cached;
      const rgba = applyBitmask(raw, mask, tileSize, bytesPerPixel, currentBitIndex);
      const canvas = new OffscreenCanvas(tileSize, tileSize);
      const ctx = canvas.getContext('2d');
      ctx.putImageData(new ImageData(rgba, tileSize, tileSize), 0, 0);
      const blob = await canvas.convertToBlob();
      return { data: await blob.arrayBuffer() };
    });

    // Self-contained vector basemap (PMTiles over HTTP range requests).
    const pmtilesProtocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', pmtilesProtocol.tile);
    const BASEMAP_URL = new URL('basemap/basemap.pmtiles', location.href).href;
    const basemapArchive = new pmtiles.PMTiles(BASEMAP_URL);
    pmtilesProtocol.add(basemapArchive);
    const bmHeader = await basemapArchive.getHeader();
    const basemapBounds = [
      [bmHeader.minLon, bmHeader.minLat],
      [bmHeader.maxLon, bmHeader.maxLat],
    ];

    const themeLayers = window.PROTOMAPS_THEME_LAYERS;

    // Basemap style overrides — identical to index.html.
    const LAND = '#f2efe9';
    const WATER = '#aadaff';
    const POI_KINDS = [
      'beach', 'forest', 'marina', 'park', 'peak', 'zoo', 'garden', 'bench',
      'aerodrome', 'station', 'bus_stop', 'ferry_terminal', 'stadium',
      'university', 'library', 'school', 'animal', 'toilets', 'drinking_water',
      'viewpoint', 'monument', 'memorial', 'attraction', 'artwork', 'museum',
      'picnic_site', 'camp_site', 'parking', 'lighthouse', 'waterfall',
      'spring', 'hospital', 'place_of_worship', 'cafe', 'restaurant', 'hotel',
      'theatre', 'cinema', 'castle',
    ];
    const OVERRIDES = {
      background: { paint: { 'background-color': LAND } },
      earth: { paint: { 'fill-color': LAND } },
      water: { paint: { 'fill-color': WATER } },
      water_stream: { paint: { 'line-color': WATER } },
      water_river: { paint: { 'line-color': WATER } },
      landuse_park: { paint: { 'fill-color': '#c8e6c9' } },
      landuse_urban_green: { paint: { 'fill-color': '#c8e6c9' } },
      buildings: { paint: { 'fill-color': '#eeeae1' } },
      roads_highway: { paint: { 'line-color': '#f9d488' } },
      roads_bridges_highway: { paint: { 'line-color': '#f9d488' } },
      roads_highway_casing_early: { paint: { 'line-color': '#f2b872' } },
      roads_highway_casing_late: { paint: { 'line-color': '#f2b872' } },
      roads_bridges_highway_casing: { paint: { 'line-color': '#f2b872' } },
      roads_other: { paint: { 'line-color': '#c58f6e', 'line-dasharray': [3, 2] } },
      roads_bridges_other: { paint: { 'line-color': '#c58f6e', 'line-dasharray': [3, 2] } },
      places_locality: { paint: { 'text-color': '#4c4641', 'text-halo-color': LAND, 'text-halo-width': 1.5, 'text-halo-blur': 0.6 } },
      places_subplace: { paint: { 'text-color': '#6f6862', 'text-halo-color': LAND, 'text-halo-width': 1.4, 'text-halo-blur': 0.6 } },
      places_region: { paint: { 'text-halo-color': LAND, 'text-halo-blur': 0.6 } },
      places_country: { paint: { 'text-halo-color': LAND, 'text-halo-blur': 0.6 } },
      roads_labels_major: { paint: { 'text-color': '#5f5854', 'text-halo-color': '#ffffff', 'text-halo-width': 1.4, 'text-halo-blur': 0.4 } },
      roads_labels_minor: { paint: { 'text-color': '#6f6862', 'text-halo-color': '#ffffff', 'text-halo-width': 1.2, 'text-halo-blur': 0.4 } },
      water_label_ocean: { paint: { 'text-color': '#5a7bb5', 'text-halo-color': WATER, 'text-halo-blur': 0.5 } },
      water_label_lakes: { paint: { 'text-color': '#5a7bb5', 'text-halo-color': WATER, 'text-halo-blur': 0.5 } },
      water_waterway_label: { paint: { 'text-color': '#5a7bb5', 'text-halo-color': WATER, 'text-halo-blur': 0.5 } },
      pois: {
        paint: {
          'text-color': ['case',
            ['in', ['get', 'kind'], ['literal', ['beach', 'forest', 'marina', 'park', 'peak', 'zoo', 'garden', 'bench']]], '#20834D',
            ['in', ['get', 'kind'], ['literal', ['aerodrome', 'station', 'bus_stop', 'ferry_terminal', 'parking']]], '#315BCF',
            ['in', ['get', 'kind'], ['literal', ['stadium', 'university', 'library', 'school', 'animal', 'toilets', 'drinking_water', 'hospital', 'place_of_worship']]], '#6A5B8F',
            '#4a443f',
          ],
          'text-halo-color': LAND,
          'text-halo-width': 1.6,
          'text-halo-blur': 0.4,
        },
        filter: ['all',
          ['in', ['get', 'kind'], ['literal', POI_KINDS]],
          ['>=', ['zoom'], ['+', ['get', 'min_zoom'], 0]],
        ],
      },
    };
    for (const layer of themeLayers) {
      const o = OVERRIDES[layer.id];
      if (!o) continue;
      if (o.paint) layer.paint = { ...layer.paint, ...o.paint };
      if (o.layout) layer.layout = { ...layer.layout, ...o.layout };
      if (o.filter) layer.filter = o.filter;
    }
    const firstSymbolIdx = themeLayers.findIndex((l) => l.type === 'symbol');
    const firstSymbolId = firstSymbolIdx === -1 ? undefined : themeLayers[firstSymbolIdx].id;
    const visibilityLayer = {
      id: 'visibility',
      type: 'raster',
      source: 'visibility',
      paint: { 'raster-opacity': 0.4, 'raster-resampling': 'nearest' },
    };
    const layers = firstSymbolIdx === -1
      ? [...themeLayers, visibilityLayer]
      : [...themeLayers.slice(0, firstSymbolIdx), visibilityLayer, ...themeLayers.slice(firstSymbolIdx)];

    const BASE_URL = location.origin + location.pathname.replace(/[^/]*$/, '');

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        glyphs: BASE_URL + 'basemap/fonts/{fontstack}/{range}.pbf',
        sprite: BASE_URL + 'basemap/sprites/light',
        sources: {
          basemap: {
            type: 'vector',
            url: 'pmtiles://' + BASEMAP_URL,
            attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> · <a href="https://protomaps.com">Protomaps</a>',
          },
          visibility: {
            type: 'raster',
            tiles: ['visibility://tiles/{z}/{x}/{y}.bin'],
            tileSize: tj.tile_size,
            minzoom: tj.minzoom,
            maxzoom: tj.maxzoom,
            attribution: 'Sunset Visibility, USGS DEM',
          },
        },
        layers,
      },
      center: INITIAL_CENTER,
      zoom: 11,
      minZoom: tj.minzoom,
      maxBounds: basemapBounds,
      attributionControl: { compact: true },
    });

    // --- Recolorization Controller ----------------------------------------
    let recolorVersion = 0;
    function applyAzimuth(bitIndex) {
      if (bitIndex === currentBitIndex) return;
      currentBitIndex = bitIndex;
      const source = map.getSource('visibility');
      if (!source) return;
      recolorVersion++;
      source.setTiles([`visibility://tiles/{z}/{x}/{y}.bin?v=${recolorVersion}`]);
    }
    function recolorizeFromInputs() {
      applyAzimuth(bitIndexForDate(dateToValue(currentDate), map.getCenter().lat));
    }

    // ═══ Verdict sampling ════════════════════════════════════════════════════
    function lngToTileX(lng, z) { return ((lng + 180) / 360) * (2 ** z); }
    function latToTileY(lat, z) {
      const s = Math.sin((lat * Math.PI) / 180);
      return (0.5 - Math.log((1 + s) / (1 - s)) / (4 * Math.PI)) * (2 ** z);
    }
    function sampleVisibility(lat, lng) {
      const zs = new Set();
      for (const url of rawCache.keys()) {
        const m = url.match(/tiles\/(\d+)\//);
        if (m) zs.add(Number(m[1]));
      }
      for (const z of [...zs].sort((a, b) => b - a)) {
        const gx = lngToTileX(lng, z);
        const gy = latToTileY(lat, z);
        const x = Math.floor(gx), y = Math.floor(gy);
        const tile = rawCache.get(`tiles/${z}/${x}/${y}.bin`);
        if (!tile || !tile.raw) continue;
        const { tileSize, bytesPerPixel, raw } = tile;
        const px = Math.min(tileSize - 1, Math.floor((gx - x) * tileSize));
        const py = Math.min(tileSize - 1, Math.floor((gy - y) * tileSize));
        return raw.subarray((py * tileSize + px) * bytesPerPixel,
                             (py * tileSize + px + 1) * bytesPerPixel);
      }
      return null;
    }
    // true / false for a computed land pixel at a bit index; null = no verdict.
    function pixelVisibleAt(pixelBytes, bitIndex) {
      if (!pixelBytes || bitIndex == null) return null;
      const rgba = colorizeBitmaskPixel(pixelBytes, layout.flagBitIndex, bitIndex);
      if (rgba[3] === 0) return null;
      return rgba[0] === 255;
    }
    function visibilityVerdict(lat, lng) {
      const v = pixelVisibleAt(sampleVisibility(lat, lng), currentBitIndex);
      if (v !== null) return v ? 'Visible' : 'Blocked';
      return pointInFill(lng, lat) ? 'Blocked' : null;
    }

    // ═══ Sun almanac ═════════════════════════════════════════════════════════
    const SUN_TZ = 'America/Los_Angeles';
    function fmtTime(d) {
      if (!d || isNaN(d.getTime())) return '—';
      return new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', timeZone: SUN_TZ,
      }).format(d);
    }
    function fmtDuration(ms) {
      if (!isFinite(ms) || ms <= 0) return '—';
      const h = Math.floor(ms / 3600000);
      const m = Math.round((ms % 3600000) / 60000);
      return `${h}h ${String(m).padStart(2, '0')}m`;
    }
    const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    function compass(deg) { return COMPASS[Math.round(deg / 22.5) % 16]; }
    function fmtLat(lat) { return `${lat.toFixed(4)}° ${lat >= 0 ? 'N' : 'S'}`; }
    function fmtLon(lon) { return `${lon.toFixed(4)}° ${lon >= 0 ? 'E' : 'W'}`; }

    function computeSun(date, lat, lng) {
      // Evaluate SunCalc at local noon: a local-midnight Date can round to the
      // PREVIOUS solar day at West Coast longitudes (off-by-one sunset times).
      const noon = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
      const times = SunCalc.getTimes(noon, lat, lng);
      const az = sunsetAzimuth(date.getFullYear(), date.getMonth() + 1, date.getDate(), lat);
      return {
        sunset: fmtTime(times.sunset),
        golden: fmtTime(times.goldenHour),
        daylight: fmtDuration(times.sunset - times.sunrise),
        azimuth: isFinite(az) ? `${Math.round(az)}° ${compass(az)}` : '—',
      };
    }

    // ═══ Sunset-direction ray (map layer) ════════════════════════════════════
    function destPoint(lat, lng, bearingDeg, distKm) {
      const R = 6371, d = distKm / R;
      const br = (bearingDeg * Math.PI) / 180;
      const la1 = (lat * Math.PI) / 180, lo1 = (lng * Math.PI) / 180;
      const la2 = Math.asin(Math.sin(la1) * Math.cos(d) +
        Math.cos(la1) * Math.sin(d) * Math.cos(br));
      const lo2 = lo1 + Math.atan2(Math.sin(br) * Math.sin(d) * Math.cos(la1),
        Math.cos(d) - Math.sin(la1) * Math.sin(la2));
      return [(lo2 * 180) / Math.PI, (la2 * 180) / Math.PI];
    }
    const EMPTY_FC = { type: 'FeatureCollection', features: [] };
    function updateRay() {
      const src = map.getSource('sunray');
      if (!src) return;
      if (!spotOpen || !spot) { src.setData(EMPTY_FC); return; }
      const az = sunsetAzimuth(currentDate.getFullYear(), currentDate.getMonth() + 1,
        currentDate.getDate(), spot.lat);
      if (!isFinite(az)) { src.setData(EMPTY_FC); return; }
      const end = destPoint(spot.lat, spot.lng, az, 140);
      src.setData({
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: [[spot.lng, spot.lat], end] },
          properties: {},
        }],
      });
    }

    // ═══ Spot plate ══════════════════════════════════════════════════════════
    const spotPlate = document.getElementById('spot-plate');
    const spCoords = document.getElementById('sp-coords');
    const spVerdict = document.getElementById('sp-verdict');
    const spRows = document.getElementById('sp-rows');

    let spotOpen = false;
    let spot = null;

    const markerEl = document.createElement('div');
    markerEl.className = 'spot-marker';
    markerEl.innerHTML = '<span class="spm-core"></span><span class="spm-ring"></span>';
    const marker = new maplibregl.Marker({ element: markerEl, anchor: 'center' });
    let markerOnMap = false;

    const VERDICT_COPY = {
      Visible: 'Clear view to the horizon',
      Blocked: 'Terrain blocks the view',
      none: 'Open water — no lookout here',
    };

    function renderPlate() {
      if (!spot) return;
      spCoords.textContent = `${fmtLat(spot.lat)} · ${fmtLon(spot.lng)}`;
      const verdict = visibilityVerdict(spot.lat, spot.lng);
      spotPlate.dataset.verdict = verdict ? verdict.toLowerCase() : 'none';
      spVerdict.textContent = VERDICT_COPY[verdict ?? 'none'];

      const sun = computeSun(currentDate, spot.lat, spot.lng);
      spRows.innerHTML = [
        ['Sunset', sun.sunset],
        ['Golden hour', sun.golden],
        ['Sets toward', sun.azimuth],
        ['Daylight', sun.daylight],
      ].map(([k, v]) => `
        <div class="sp-row">
          <span class="sp-key">${k}</span>
          <span class="sp-val">${v}</span>
        </div>`).join('');
    }

    function updateMarker() {
      if (spotOpen && spot) {
        marker.setLngLat([spot.lng, spot.lat]);
        if (!markerOnMap) { marker.addTo(map); markerOnMap = true; }
      } else if (markerOnMap) {
        marker.remove();
        markerOnMap = false;
      }
    }
    function openSpot(pt) {
      spot = { lat: pt.lat, lng: pt.lng };
      spotOpen = true;
      spotPlate.dataset.open = '1';
      spotPlate.setAttribute('aria-hidden', 'false');
      renderPlate();
      updateMarker();
      updateRay();
      drawRail();                       // the rail gains this spot's day strip
    }
    function closeSpot() {
      spotOpen = false;
      spot = null;
      spotPlate.dataset.open = '0';
      spotPlate.setAttribute('aria-hidden', 'true');
      updateMarker();
      updateRay();
      drawRail();                       // strip off, caption back to default
    }
    document.getElementById('sp-close').addEventListener('click', closeSpot);

    // ═══ Year rail (from alt) + per-day spot strip (from alt2) ══════════════
    const rail = document.getElementById('rail');
    const railSvg = document.getElementById('rail-svg');
    const railCap = document.getElementById('rail-cap');
    const knob = document.getElementById('knob');
    const dcWk = document.getElementById('dc-wk');
    const dcDate = document.getElementById('dc-date');
    const dcYr = document.getElementById('dc-yr');
    const todayBtn = document.getElementById('today-btn');

    function daysInYear(y) { return (new Date(y, 11, 31) - new Date(y, 0, 0)) / 86400000; }
    function dayOfYear(d) { return Math.round((d - new Date(d.getFullYear(), 0, 0)) / 86400000); }
    function dateFromDoy(y, doy) { return new Date(y, 0, doy); }

    const RAIL_W = 1000, RAIL_H = 64;
    const CURVE_TOP = 6, CURVE_BOT = 34;      // azimuth curve band
    const STRIP_Y = 39, STRIP_H = 9;          // per-day visibility band
    const CAP_DEFAULT = 'Drag the sun to pick a date';
    const CAP_STRIP = 'Horizon sunsets here — colored days reach the horizon, tap to preview';
    const CAP_STRIP_SHORT = 'Colored days reach the horizon — tap to preview';
    const MOBILE_MQ = matchMedia('(max-width:640px)');

    function drawRail() {
      const y = currentDate.getFullYear();
      const days = daysInYear(y);
      const lat = map ? map.getCenter().lat : INITIAL_CENTER[1];
      const xFor = (doy) => ((doy - 1) / (days - 1)) * RAIL_W;

      // The year's sunset-azimuth curve at the map-center latitude — the same
      // function that drives the overlay encoding.
      const pts = [];
      let minAz = Infinity, maxAz = -Infinity;
      for (let doy = 1; doy <= days; doy += 4) {
        const d = dateFromDoy(y, doy);
        const az = sunsetAzimuth(y, d.getMonth() + 1, d.getDate(), lat);
        if (!isFinite(az)) continue;
        pts.push([doy, az]);
        if (az < minAz) minAz = az;
        if (az > maxAz) maxAz = az;
      }
      const yFor = (az) => CURVE_BOT - ((az - minAz) / (maxAz - minAz || 1)) * (CURVE_BOT - CURVE_TOP);
      const poly = pts.map(([doy, az]) => `${xFor(doy).toFixed(1)},${yFor(az).toFixed(1)}`).join(' ');
      const area = `${xFor(pts[0][0]).toFixed(1)},${CURVE_BOT} ` + poly +
        ` ${xFor(pts[pts.length - 1][0]).toFixed(1)},${CURVE_BOT}`;

      // Season ticks: equinoxes and solstices (fixed civil dates are close
      // enough at this width).
      const seasons = [
        [dayOfYear(new Date(y, 2, 20)), 'EQX'],
        [dayOfYear(new Date(y, 5, 20)), 'SOL'],
        [dayOfYear(new Date(y, 8, 22)), 'EQX'],
        [dayOfYear(new Date(y, 11, 21)), 'SOL'],
      ];
      const months = Array.from({ length: 12 }, (_, m) => {
        const mid = dayOfYear(new Date(y, m, 15));
        return `<text class="month" x="${xFor(mid).toFixed(1)}" y="${RAIL_H - 4}">` +
          'JFMAMJJASOND'[m] + '</text>';
      }).join('');

      const today = new Date();
      const todayLine = today.getFullYear() === y
        ? `<line class="today-mark" x1="${xFor(dayOfYear(today)).toFixed(1)}" y1="${CURVE_TOP}"` +
          ` x2="${xFor(dayOfYear(today)).toFixed(1)}" y2="${STRIP_Y + STRIP_H + 1}"/>`
        : '';

      // Per-day visibility strip for the selected spot (the pixel's bitmask
      // already holds every azimuth — a whole year is 365 cheap bit reads).
      // Fill-covered land (no computed tile) is honestly all-blocked; open
      // water / abroad gets no strip at all.
      let strip = '';
      let stripDays = 0;
      if (spotOpen && spot) {
        const pixel = sampleVisibility(spot.lat, spot.lng);
        const landNoData = !pixel && pointInFill(spot.lng, spot.lat);
        if (pixel || landNoData) {
          const w = RAIL_W / days;
          for (let doy = 1; doy <= days; doy++) {
            let cls = 'day-b';
            if (pixel) {
              const d = dateFromDoy(y, doy);
              const bi = layout.azimuthToBitIndex(
                sunsetAzimuth(y, d.getMonth() + 1, d.getDate(), spot.lat));
              const v = pixelVisibleAt(pixel, bi);
              if (v === null) continue;           // water pixel / outside window
              cls = v ? 'day-v' : 'day-b';
            }
            stripDays++;
            strip += `<rect class="${cls}" x="${((doy - 1) * w).toFixed(1)}" y="${STRIP_Y}"` +
              ` width="${(w + 0.3).toFixed(1)}" height="${STRIP_H}"/>`;
          }
        }
      }
      // An engine-water pixel emits zero day rects — no band, default caption.
      const hasStrip = stripDays > 0;
      railCap.textContent = hasStrip
        ? (MOBILE_MQ.matches ? CAP_STRIP_SHORT : CAP_STRIP)
        : CAP_DEFAULT;
      railCap.dataset.strip = hasStrip ? '1' : '0';

      railSvg.setAttribute('viewBox', `0 0 ${RAIL_W} ${RAIL_H}`);
      railSvg.innerHTML = `
        <defs>
          <linearGradient id="railGlow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#d99a2b" stop-opacity=".3"/>
            <stop offset="1" stop-color="#d99a2b" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon class="az-fill" points="${area}"/>
        <polyline class="az-curve" points="${poly}"/>
        ${seasons.map(([doy, lbl]) =>
          `<line class="tick" x1="${xFor(doy).toFixed(1)}" y1="${CURVE_TOP}" x2="${xFor(doy).toFixed(1)}" y2="${CURVE_BOT}"/>` +
          `<text class="tick-label" x="${(xFor(doy) + 3).toFixed(1)}" y="${CURVE_TOP + 7}">${lbl}</text>`,
        ).join('')}
        ${strip}
        ${todayLine}
        ${months}`;
    }

    function renderDate() {
      dcWk.textContent = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(currentDate);
      dcDate.textContent = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric' }).format(currentDate);
      dcYr.textContent = currentDate.getFullYear();
      const days = daysInYear(currentDate.getFullYear());
      const doy = dayOfYear(currentDate);
      knob.style.left = `${((doy - 1) / (days - 1)) * 100}%`;
      rail.setAttribute('aria-valuemax', days);
      rail.setAttribute('aria-valuenow', doy);
      rail.setAttribute('aria-valuetext', new Intl.DateTimeFormat('en-US',
        { month: 'long', day: 'numeric', year: 'numeric' }).format(currentDate));
      todayBtn.dataset.today = sameDay(currentDate, new Date()) ? '1' : '0';
    }

    function selectDate(d, { redrawRail = false } = {}) {
      const yearChanged = d.getFullYear() !== currentDate.getFullYear();
      currentDate = d;
      renderDate();
      if (yearChanged || redrawRail) drawRail();
      recolorizeFromInputs();
      if (spotOpen) renderPlate();
      updateRay();
      renderMiniCal();
    }

    // drag / click on the rail
    let dragging = false;
    function railDateFromEvent(e) {
      const rect = rail.getBoundingClientRect();
      const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      const y = currentDate.getFullYear();
      const days = daysInYear(y);
      return dateFromDoy(y, 1 + Math.round(frac * (days - 1)));
    }
    rail.addEventListener('pointerdown', (e) => {
      dragging = true;
      rail.dataset.drag = '1';
      rail.setPointerCapture(e.pointerId);
      selectDate(railDateFromEvent(e));
    });
    rail.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const d = railDateFromEvent(e);
      if (!sameDay(d, currentDate)) selectDate(d);
    });
    const endDrag = () => { dragging = false; rail.dataset.drag = '0'; };
    rail.addEventListener('pointerup', endDrag);
    rail.addEventListener('pointercancel', endDrag);

    rail.addEventListener('keydown', (e) => {
      const step = { ArrowLeft: -1, ArrowRight: 1, ArrowDown: -7, ArrowUp: 7 }[e.key];
      if (!step) return;
      e.preventDefault();
      const d = new Date(currentDate);
      d.setDate(d.getDate() + (e.shiftKey ? step * 7 : step));
      selectDate(d);
    });

    document.getElementById('step-back').addEventListener('click', () => {
      const d = new Date(currentDate); d.setDate(d.getDate() - 1); selectDate(d);
    });
    document.getElementById('step-fwd').addEventListener('click', () => {
      const d = new Date(currentDate); d.setDate(d.getDate() + 1); selectDate(d);
    });
    todayBtn.addEventListener('click', () => selectDate(new Date()));

    // ═══ Mini calendar popover ═══════════════════════════════════════════════
    const dateChip = document.getElementById('date-chip');
    const miniCal = document.getElementById('mini-cal');
    let calOpen = false;
    let calView = { y: currentDate.getFullYear(), m: currentDate.getMonth() };
    const MONTHS = ['January','February','March','April','May','June','July',
      'August','September','October','November','December'];

    function renderMiniCal() {
      if (!calOpen) return;
      const { y, m } = calView;
      const first = new Date(y, m, 1).getDay();
      const nDays = new Date(y, m + 1, 0).getDate();
      const today = new Date();
      let cells = '';
      for (let i = 0; i < first; i++) cells += '<span class="mc-empty"></span>';
      for (let d = 1; d <= nDays; d++) {
        const cd = new Date(y, m, d);
        cells += `<button class="mc-day" data-d="${d}"` +
          ` data-selected="${sameDay(cd, currentDate) ? '1' : '0'}"` +
          ` data-today="${sameDay(cd, today) ? '1' : '0'}">${d}</button>`;
      }
      miniCal.innerHTML = `
        <div class="mc-head">
          <button class="mc-nav" data-nav="-1" aria-label="Previous month">
            <svg width="11" height="11" viewBox="0 0 12 12"><path d="M8 1.5 3.5 6 8 10.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="mc-title">${MONTHS[m]} <span class="yr">${y}</span></div>
          <button class="mc-nav" data-nav="1" aria-label="Next month">
            <svg width="11" height="11" viewBox="0 0 12 12"><path d="M4 1.5 8.5 6 4 10.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="mc-week">${['S','M','T','W','T','F','S'].map((d) => `<span>${d}</span>`).join('')}</div>
        <div class="mc-grid">${cells}</div>`;
    }
    function positionMiniCal() {
      const r = dateChip.getBoundingClientRect();
      miniCal.style.left = `${Math.min(Math.max(10, r.left), window.innerWidth - 266)}px`;
      miniCal.style.bottom = `${window.innerHeight - r.top + 10}px`;
      miniCal.style.top = 'auto';
    }
    function openCal() {
      calOpen = true;
      calView = { y: currentDate.getFullYear(), m: currentDate.getMonth() };
      renderMiniCal();
      positionMiniCal();
      miniCal.dataset.open = '1';
      miniCal.setAttribute('aria-hidden', 'false');
      dateChip.setAttribute('aria-expanded', 'true');
    }
    function closeCal() {
      calOpen = false;
      miniCal.dataset.open = '0';
      miniCal.setAttribute('aria-hidden', 'true');
      dateChip.setAttribute('aria-expanded', 'false');
    }
    dateChip.addEventListener('click', () => (calOpen ? closeCal() : openCal()));
    miniCal.addEventListener('click', (e) => {
      const nav = e.target.closest('.mc-nav');
      if (nav) {
        let mo = calView.m + Number(nav.dataset.nav), yr = calView.y;
        if (mo < 0) { mo = 11; yr--; }
        if (mo > 11) { mo = 0; yr++; }
        calView = { y: yr, m: mo };
        renderMiniCal();
        return;
      }
      const day = e.target.closest('.mc-day');
      if (day) {
        selectDate(new Date(calView.y, calView.m, Number(day.dataset.d)));
        closeCal();
      }
    });
    document.addEventListener('mousedown', (e) => {
      if (calOpen && !e.target.closest('.mini-cal') && !e.target.closest('.date-chip')) closeCal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (calOpen) closeCal();
      else if (spotOpen) closeSpot();
    });

    // ═══ Locate me + zoom ════════════════════════════════════════════════════
    const locateBtn = document.getElementById('locate');
    const toast = document.getElementById('toast');
    let toastTimer = 0;
    function showToast(msg) {
      toast.textContent = msg;
      toast.dataset.show = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.dataset.show = '0'; }, 4200);
    }
    function inBounds(lng, lat) {
      const [[w, s], [e, n]] = basemapBounds;
      return lng >= w && lng <= e && lat >= s && lat <= n;
    }
    locateBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        showToast('This browser does not share location.');
        return;
      }
      locateBtn.dataset.busy = '1';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          locateBtn.dataset.busy = '0';
          const { latitude: lat, longitude: lng } = pos.coords;
          if (!inBounds(lng, lat)) {
            showToast('You are outside the mapped area — the map covers the western US coast.');
            return;
          }
          map.flyTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 12) });
          openSpot({ lat, lng });
        },
        () => {
          locateBtn.dataset.busy = '0';
          showToast('Location is unavailable. Check the browser permission and try again.');
        },
        { enableHighAccuracy: false, timeout: 12000, maximumAge: 60000 },
      );
    });
    document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
    document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

    // ═══ Map wiring ══════════════════════════════════════════════════════════
    map.on('click', (e) => openSpot({ lat: e.lngLat.lat, lng: e.lngLat.lng }));

    map.on('load', () => {
      map.resize();
      recolorizeFromInputs();
      drawRail();
      map.addSource('sunray', { type: 'geojson', data: EMPTY_FC });
      map.addLayer({
        id: 'sunray-line',
        type: 'line',
        source: 'sunray',
        paint: {
          'line-color': '#cf5b2e',
          'line-width': 2.4,
          'line-opacity': 0.9,
          'line-dasharray': [0.2, 1.9],
        },
        layout: { 'line-cap': 'round' },
      }, firstSymbolId);
    });
    const collapseAttrib = () => {
      const a = map.getContainer().querySelector('.maplibregl-ctrl-attrib');
      if (a && !a.matches(':hover')) a.classList.remove('maplibregl-compact-show');
    };
    map.on('data', collapseAttrib);
    map.on('idle', collapseAttrib);
    setTimeout(() => map.resize(), 200);
    map.on('moveend', () => {
      recolorizeFromInputs();
      drawRail();                        // curve tracks the map latitude
      if (spotOpen) renderPlate();
    });
    // crossing the mobile breakpoint swaps the rail caption length
    MOBILE_MQ.addEventListener('change', () => drawRail());

    // initial paint
    renderDate();
    drawRail();
  })();
  </script>
</body>
</html>
