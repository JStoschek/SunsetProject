# Sunset Visibility Map — offline pipeline configuration
#
# All tunable parameters for the C++ processing pipeline live here so they can
# be changed without recompiling. Format: `key = value`, one per line; `#`
# begins a comment. Units are in the key suffix or the comment.
#
# Per-run inputs (the processing bounding box: min_lat/max_lat/min_lon/max_lon)
# are NOT in this file — they are passed per invocation. Each box must include
# the coast and have its western edge offshore the mainland (see ADR-0008).

# ── Physical constants ───────────────────────────────────────────────
refraction_coefficient_k   = 0.13       # atmospheric refraction coefficient (dimensionless)
earth_radius_m             = 6371000    # mean Earth radius (metres)
observer_eye_height_m      = 2        # observer eye height above bare ground (metres)

# ── Line-of-sight model (ADR-0008) ───────────────────────────────────
# Seaward offset of the sea-level line-of-sight reference from the coastline
# crossing; this is the value of `d` at the coast. Regularizes the d->0
# singularity and sets how strongly close coastal features block. Larger =>
# coastal features block less and a small curvature baseline is added.
horizon_reference_offset_m = 2500
# Passable-foreshore depth: terrain within this many metres inland of the
# coastline crossing does not raise the running-max obstruction profile, so low
# foredunes/berms at the shore don't shadow the flat in their own lee (where an
# observer plainly sees the ocean horizon). Real relief farther inland still
# blocks. 0 disables. ~150 m covers the Ocean Beach berm/Great Highway band.
coast_obstruction_skip_m   = 0

# ── Grid ─────────────────────────────────────────────────────────────
cell_per_degree            = 10800      # 1 cell = 1/10800 deg = 1/3 arc-second
meters_per_degree_lat      = 111320     # flat-earth metres per degree of latitude
# Sample spacing of the Visibility Sample Grid (ADR-0014). One knob drives BOTH
# the perpendicular ray spacing and the along-ray march step, so the grid is
# square in the ray frame. 1/3 arc-second (~10.307 m) matches the output cell.
# Density knob: lower = sharper visibility boundaries, linearly more compute.
sample_spacing_arcsec      = 0.33333333333333

# ── Azimuth sweep (sunset azimuths, degrees clockwise from north) ─────
azimuth_min_deg            = 233        # inclusive
azimuth_max_deg            = 309        # inclusive
azimuth_step_deg           = 1.0

# ── Azimuth range pipeline (compute_azimuth_range) ───────────────────
# The bbox is split into latitude strips; all azimuths are run per strip
# before writing that strip to the output GeoTIFF and advancing. Strip
# width controls peak memory: one strip's float32 accumulator (2 bands ×
# strip_height_deg × 3° lon × 10800²) should fit comfortably in RAM.
strip_height_deg           = 0.1        # latitude height of each processing strip
strip_tilt_margin_deg      = 0.65       # N/S lat margin for the ray tilt (ADR-0007) when
                                        # freezing a strip's DEM/ocean working set

# ── Coast finding ─────────────────────────────────────────────────────
# Coast-finding is folded into the engine's per-ray march (ADR-0014): each ray
# steps at sample_spacing testing is_water until it flips to land. This is the
# per-ray give-up distance; a ray with no coast within it yields no visible
# samples.
coast_march_max_km         = 100.0

# ── West-edge preflight (ADR-0015) ───────────────────────────────────
# Before sweeping, is_water is sampled along the box's western-edge column
# (one sample per output row). If more than this fraction of samples are land
# the box is mis-anchored — its western edge must be offshore (ADR-0008) —
# and the run hard-errors before writing any output. The tolerance forgives
# a stray rock or clipped headland without admitting a truly inland box.
west_edge_max_land_frac    = 0.05

# ── Parallelism ──────────────────────────────────────────────────────
worker_threads             = 0          # 0 = all hardware cores; positive value pins pool size

# ── Tile caches ──────────────────────────────────────────────────────
# MUST be >= a single strip's working set (the tiles strip_working_set()
# returns: lat span + 2·strip_tilt_margin_deg, times the bbox lon span). If a
# cache is smaller than the working set, freeze() self-evicts tiles mid-strip
# and re-rasterizes / re-loads them on every strip instead of once — the serial
# per-strip cost that dominated wall time. For a ~1.4° bbox this is 9 tiles;
# 16 leaves headroom. Peak RAM is bounded by the distinct working-set tiles
# (the frozen snapshot already holds them), not by this ceiling.
dem_lru_capacity           = 16         # DEM tiles held resident (float 10800² ≈ 466 MB each)
ocean_lru_capacity         = 16         # ocean-mask tiles held resident (packed bits ≈ 15 MB each)

# ── Data paths ───────────────────────────────────────────────────────
# The Ocean Mask is built from OpenStreetMap-derived water (ADR-0012), the same
# lineage the basemap renders, so the visibility coastline aligns with what the
# user sees. See docs/data-prep-osm-water.md for how to fetch and prepare these.
dem_dir                    = /Users/jstoschek/Code/SunsetProject/data/DEM
# osmdata.openstreetmap.de full-resolution split `water-polygons` shapefile
# (ocean + coastline). Required.
osm_water_polygons_path    = /Users/jstoschek/Code/SunsetProject/data/OSM/water-polygons-split-4326/water_polygons.shp
# Geofabrik `natural=water` extract (inland lakes/ponds, e.g. Lake Merced).
# Optional: leave blank to omit inland water. Left blank deliberately: inland
# lakes are treated as land — they get an opaque visibility verdict like any
# other land pixel instead of rendering transparent. Only the ocean/coastline
# water-polygons above count as water.
osm_inland_water_path      =
