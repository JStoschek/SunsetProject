# Sunset Visibility Map — offline pipeline configuration
#
# All tunable parameters for the C++ processing pipeline live here so they can
# be changed without recompiling. Format: `key = value`, one per line; `#`
# begins a comment. Units are in the key suffix or the comment.
#
# Per-run inputs (the processing bounding box: min_lat/max_lat/min_lon/max_lon)
# are NOT in this file — they are passed per invocation. Each box must include
# the coast and have its western edge offshore the mainland (see ADR-0008).

# ── Physical constants ───────────────────────────────────────────────
refraction_coefficient_k   = 0.13       # atmospheric refraction coefficient (dimensionless)
earth_radius_m             = 6371000    # mean Earth radius (metres)
observer_eye_height_m      = 1.7        # observer eye height above bare ground (metres)

# ── Line-of-sight model (ADR-0008) ───────────────────────────────────
# Seaward offset of the sea-level line-of-sight reference from the coastline
# crossing; this is the value of `d` at the coast. Regularizes the d->0
# singularity and sets how strongly close coastal features block. Larger =>
# coastal features block less and a small curvature baseline is added.
horizon_reference_offset_m = 1000

# ── Grid ─────────────────────────────────────────────────────────────
cell_per_degree            = 10800      # 1 cell = 1/10800 deg = 1/3 arc-second
meters_per_degree_lat      = 111320     # flat-earth metres per degree of latitude
march_step_m               = 10.308     # Phase-1 along-ray sample step (~ one cell of latitude)

# ── Azimuth sweep (sunset azimuths, degrees clockwise from north) ─────
azimuth_min_deg            = 233        # inclusive
azimuth_max_deg            = 309        # inclusive
azimuth_step_deg           = 1.0

# ── Azimuth range pipeline (compute_azimuth_range) ───────────────────
# The bbox is split into latitude strips; all azimuths are run per strip
# before writing that strip to the output GeoTIFF and advancing. Strip
# width controls peak memory: one strip's float32 accumulator (2 bands ×
# strip_height_deg × 3° lon × 10800²) should fit comfortably in RAM.
strip_height_deg           = 0.1        # latitude height of each processing strip
strip_tilt_margin_deg      = 0.65       # N/S lat margin for the ray tilt (ADR-0007) when
                                        # freezing a strip's DEM/ocean working set

# ── Coast finding (OceanMaskRasterizer::ocean_origin_for_ray) ─────────
coast_march_step_km        = 0.05       # eastward is_water march step (50 m ≈ 5 DEM cells)
coast_march_max_km         = 100.0      # give-up distance for the coast search

# ── Parallelism ──────────────────────────────────────────────────────
worker_threads             = 0          # 0 = all hardware cores; positive value pins pool size

# ── Tile caches ──────────────────────────────────────────────────────
dem_lru_capacity           = 8          # DEM tiles held resident
ocean_lru_capacity         = 8          # ocean-mask tiles held resident

# ── Data paths ───────────────────────────────────────────────────────
# The Ocean Mask is built from OpenStreetMap-derived water (ADR-0012), the same
# lineage the basemap renders, so the visibility coastline aligns with what the
# user sees. See docs/data-prep-osm-water.md for how to fetch and prepare these.
dem_dir                    = /Users/jstoschek/Code/SunsetProject/data/DEM
# osmdata.openstreetmap.de full-resolution split `water-polygons` shapefile
# (ocean + coastline). Required.
osm_water_polygons_path    = /Users/jstoschek/Code/SunsetProject/data/OSM/water-polygons-split-4326/water_polygons.shp
# Geofabrik `natural=water` extract (inland lakes/ponds, e.g. Lake Merced).
# Optional: leave blank to omit inland water.
osm_inland_water_path      = /Users/jstoschek/Code/SunsetProject/data/OSM/norcal-natural-water/norcal_natural_water.shp
